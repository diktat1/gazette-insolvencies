name: Daily Gazette Insolvency Report

on:
  schedule:
    # Unified digest target: arrival ~06:00 UK. This pipeline needs ~3h runtime
    # (UK+RO enrichment), so it starts 03:00 UK to land alongside the faster feeds.
    # GitHub Actions cron can lag, so arrival is a target not exact. DST dual cron.
    - cron: '0 3 * 11,12,1,2,3 *'    # 03:00 UTC = 03:00 GMT (Nov-Mar) → ~3h before 06:00
    - cron: '0 2 * 4,5,6,7,8,9,10 *' # 02:00 UTC = 03:00 BST (Apr-Oct) → ~3h before 06:00
  workflow_dispatch:  # Allow manual trigger from GitHub UI
    inputs:
      test_mode:
        description: 'Send test email only (no Gazette scan)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Never let two runs overlap (e.g. a slow run still going when the next cron
# fires). Cancel the older in-progress run in favour of the newer one.
concurrency:
  group: daily-report
  cancel-in-progress: true

jobs:
  send-report:
    runs-on: ubuntu-latest
    # Hard ceiling well under GitHub's 6h default. The pipeline's own budgets
    # (Romania TIME_BUDGET_S etc.) should finish long before this; this is the
    # backstop so a hung request can never burn a 6h job again.
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run insolvency analyser, send report, and outreach
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.SMTP_USER }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          LOOKBACK_DAYS: 1
          # Per-notice enrichment runs concurrently (I/O-bound); CH calls are
          # globally rate-limited inside the client so this stays within limits.
          ANALYSE_CONCURRENCY: 8
          # Romania module (BPI via lege5.ro + ANAF enrichment) - appended to same report
          ROMANIA_ENABLED: "true"
          ROMANIA_LOOKBACK_DAYS: 1
          # Scan the whole day's filings, but bound deep enrichment so the job
          # always finishes inside the 6h cap: enrich at most MAX_ENRICH of the
          # asset-rich live candidates, and stop after TIME_BUDGET_S regardless.
          ROMANIA_MAX_COMPANIES: 2000
          ROMANIA_MAX_ENRICH: 400
          ROMANIA_TIME_BUDGET_S: 2400
          ROMANIA_CONCURRENCY: 6
          # Auction lane retired - no auction email is sent, so skip the scrape.
          ROMANIA_AUCTIONS_ENABLED: "false"
          ROMANIA_AUCTIONS_MAX: 30
          # USA (CourtListener RECAP) and Turkey (ilan.gov.tr) modules.
          # Each is isolated in main.py behind try/except so it cannot break UK/RO.
          USA_ENABLED: "true"
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
          TURKEY_ENABLED: "true"
          # LLM triage layer (qwen via OpenRouter; module is a no-op without key)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # OpenRouter Auto Router - picks a model per prompt from a curated pool.
          OPENROUTER_MODEL: openrouter/auto
          BATCH_SIZE: 15
          LLM_CONCURRENCY: 8
          RETRY_LIMIT: 3
          TRIAGE_TOP_N: 10
          HEURISTIC_WEIGHT: 0.5
          TIER_WEIGHT: 0.5
          # Outreach settings
          OUTREACH_SENDER_NAME: "Kamil Altintasoglu"
          OUTREACH_SENDER_PHONE: "+44 7985 250 883"
          OUTREACH_MIN_SCORE: 40
          # Test mode - redirect all outreach to EMAIL_TO instead of real IPs
          OUTREACH_TEST_RECIPIENT: ${{ github.event.inputs.test_mode == 'true' && secrets.EMAIL_TO || '' }}
          # Limit sends in test mode to 1 (just one example)
          OUTREACH_MAX_SENDS: ${{ github.event.inputs.test_mode == 'true' && '1' || '0' }}
          # Skip slow website checks in test mode
          SKIP_WEBSITE_CHECK: ${{ github.event.inputs.test_mode == 'true' && 'true' || 'false' }}
        run: |
          python main.py

      - name: Commit and push outreach database and triage audit logs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/outreach.db data/triage-decisions-*.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Update outreach database and triage logs [skip ci]"
          # The remote can move while a run is in flight (a manual push, or two
          # runs racing), which makes a plain push fail non-fast-forward. Rebase
          # our data commit on top of origin and retry before giving up.
          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing on origin and retrying..."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          done
          echo "Push still failing after 3 attempts." >&2
          exit 1
